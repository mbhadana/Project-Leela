<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            /* State Colors */
            --color-idle: transparent;
            --color-listening: #F9730C;
            /* Orange from user palette */
            --color-processing: #A5BBFC;
            /* Light Blue from user palette */
            --color-success: #1ce85b;
            --color-error: #ff0000;
            --color-warning: #FFD700;
            /* Gold/Yellow for warnings */

            --bar-color: var(--color-idle);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            /* Flush with taskbar boundary */
            justify-content: center;
            height: 20px;
            background: transparent;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }

        /* Top Bar */
        #top-bar {
            width: 100vw;
            height: 1px;
            /* Thin elegant line */
            background-color: var(--bar-color);
            background-size: 100vw 100%;
            /* Changed to 100vw to facilitate seamless background-position wrap */
            transition: background-color 0.3s ease, box-shadow 0.3s ease, opacity 0.5s ease;
            box-shadow: 0 0 10px var(--bar-color);
            opacity: 0;
            /* Hidden by default */
        }

        /* State Colors */
        #top-bar[data-state="IDLE"] {
            opacity: 0;
            --bar-color: transparent;
        }

        #top-bar[data-state="LISTENING"] {
            opacity: 1;
            --bar-color: var(--color-listening);
            background-image: linear-gradient(90deg, #F9730C, #FFB053, #A5BBFC, #FAFAFA, #F9730C);
            background-size: 200% 100%;
        }

        #top-bar[data-state="SUCCESS_PASTE"],
        #top-bar[data-state="SUCCESS_POLISH"] {
            opacity: 1;
            --bar-color: #F9730C;
            background-image: linear-gradient(90deg, #F9730C, #FFB053, #A5BBFC, #FAFAFA, #F9730C);
            box-shadow: 0 0 15px #FFB053;
        }

        #top-bar[data-state="ERROR"] {
            opacity: 1;
            --bar-color: #ff0000;
            background-image: none;
            box-shadow: 0 0 20px #ff0000;
        }

        #top-bar[data-state="WARNING"] {
            opacity: 1;
            --bar-color: var(--color-warning);
            background-image: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
            background-size: 200% 100%;
            box-shadow: 0 0 15px var(--color-warning);
        }

        /* Processing State Animation */
        @keyframes pulse-processing {
            0% {
                opacity: 0.7;
                box-shadow: 0 0 5px var(--color-processing);
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 20px var(--color-processing);
            }

            100% {
                opacity: 0.7;
                box-shadow: 0 0 5px var(--color-processing);
            }
        }

        #top-bar[data-state="PROCESSING"] {
            opacity: 1;
            --bar-color: var(--color-processing);
            background-image: linear-gradient(90deg, #F9730C, #FFB053, #A5BBFC, #FAFAFA, #F9730C);
            background-size: 200% 100%;
            animation: pulse-processing 0.5s ease-in-out infinite;
        }

        #status-label {
            position: fixed;
            bottom: 5px;
            /* Floats just above the bottom line */
            left: 50%;
            transform: translateX(-50%);
            color: #FAFAFA;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            white-space: nowrap;
        }

        #status-label.visible {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="top-bar" data-state="IDLE"></div>
    <div id="status-label"></div>

    <script>
        const topBar = document.getElementById('top-bar');
        const statusLabel = document.getElementById('status-label');

        let currentMicLevel = 0;
        let flowPos = 0;
        let animationFrameId = null;
        let resultTimeout = null;

        window.leela.on('mic-data', (level) => {
            currentMicLevel = level;
        });

        function animateFlow() {
            const state = topBar.dataset.state;

            if (state === 'IDLE') {
                animationFrameId = null;
                return;
            }

            if (state === 'LISTENING') {
                let speed = 0.5 + (currentMicLevel * 10);
                flowPos -= speed;
                if (flowPos <= -200) flowPos += 200;

                topBar.style.backgroundPosition = `${flowPos}% 0`;
                let glow = 5 + (currentMicLevel * 20);
                topBar.style.boxShadow = `0 0 ${glow}px var(--color-listening)`;
            } else if (state === 'PROCESSING') {
                let speed = 5;
                flowPos -= speed;
                if (flowPos <= -200) flowPos += 200;
                topBar.style.backgroundPosition = `${flowPos}% 0`;
                topBar.style.boxShadow = `0 0 25px #A5BBFC`;
            } else if (state === 'WARNING') {
                let speed = 2;
                flowPos -= speed;
                if (flowPos <= -200) flowPos += 200;
                topBar.style.backgroundPosition = `${flowPos}% 0`;
                topBar.style.boxShadow = `0 0 15px var(--color-warning)`;
            }

            animationFrameId = requestAnimationFrame(animateFlow);
        }

        // Start render loop
        animationFrameId = requestAnimationFrame(animateFlow);

        window.leela.on('update-status', (stateKey, message) => {
            console.log('[OVERLAY] New state:', stateKey, 'Message:', message);
            topBar.dataset.state = stateKey;

            if (message) {
                statusLabel.textContent = message;
                statusLabel.classList.add('visible');
            } else {
                statusLabel.classList.remove('visible');
            }

            if (stateKey !== 'PROCESSING') {
                topBar.style.animation = 'none';
            } else {
                topBar.style.animation = '';
            }

            if (stateKey !== 'IDLE' && !animationFrameId) {
                animateFlow();
            }

            if (resultTimeout) {
                clearTimeout(resultTimeout);
                resultTimeout = null;
            }

            if (stateKey.startsWith('SUCCESS') || stateKey === 'ERROR' || stateKey === 'WARNING') {
                resultTimeout = setTimeout(() => {
                    if (topBar.dataset.state === stateKey) {
                        topBar.dataset.state = 'IDLE';
                        statusLabel.classList.remove('visible');
                    }
                    resultTimeout = null;
                }, 3000);
            }
        });

        window.leela.on('hide-status', () => {
            topBar.dataset.state = 'IDLE';
        });
    </script>
</body>

</html>
