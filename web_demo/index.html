<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="leela-version" content="fix-2026-03-16-authorized">
    <title>Leela Demo - Professional AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --frame-bg: #0B0B0B;
            --accent-border: rgba(255, 255, 255, 0.25);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        
        /* Scaling container to match 1920x1080 target */
        #screen-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: #000000;
            transform-origin: center;
            flex-shrink: 0;
        }

        /* Abstract Vectors from CSS specs */
        .vector { position: absolute; border: 2px solid #0B0B0B; }
        #v8 { width: 93.37px; height: 164.5px; left: 50.36px; top: 428.85px; }
        #v9 { width: 102.47px; height: 194.56px; left: 68.55px; top: 349.26px; }
        
        /* Main Frame 2558 */
        #main-frame {
            box-sizing: border-box;
            position: absolute;
            width: 1500px;
            height: 682px;
            left: 210px;
            top: 228px;
            border: 1px solid #FFFFFF;
            border-radius: 25px;
            background: transparent;
            overflow: hidden;
        }

        /* Grid lines inside Frame 2556 */
        .inner-grid-line {
            width: 1500px;
            height: 0px;
            border-top: 0.5px solid var(--accent-border);
            margin-bottom: 62px;
        }

        /* Controls / Bottom Frame 2557 */
        #dictate-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 966px;
            height: 74px;
            background: #0B0B0B;
            border: 0.3px solid #FFFFFF;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 0.03em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* State-specific layouts */
        .screen-content {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: opacity 0.4s ease;
        }

        #header-area {
            position: absolute;
            width: 802.34px;
            left: 210px;
            top: 94px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .headline {
            font-weight: 600;
            font-size: 48px;
            line-height: 48px;
            letter-spacing: -2.4px;
            color: #FFFFFF;
        }

        .subtitle {
            font-weight: 400;
            font-size: 24px;
            line-height: 36px;
            color: #FFFFFF;
            padding-top: 8px;
        }

        #editor {
            width: 1159px;
            height: 300px;
            background: transparent;
            border: none;
            outline: none;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Outfit';
            font-size: 22px;
            line-height: 28px;
            position: absolute;
            left: 210px;
            top: 228px;
            padding: 40px;
            z-index: 10;
            resize: none;
        }

        /* Screen 3 floating cards */
        .floating-cmd {
            position: absolute;
            background: #0B0B0B;
            border: 0.3px solid #FFFFFF;
            border-radius: 20px;
            color: #FFFFFF;
            padding: 5px 20px;
            font-size: 14px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

    <div id="screen-container">
        <!-- Abstract Decorations -->
        <div id="v8" class="vector"></div>
        <div id="v9" class="vector"></div>

        <!-- Static Header (Always present in Desktop-2/3) -->
        <div id="header-area">
            <div class="headline">Speak or write anything...</div>
            <div class="subtitle">Leela works in every app. Just press Ctrl + Space anywhere you write.</div>
        </div>

        <!-- The Main Interactive Content Box -->
        <div id="main-frame">
            <!-- Grid Lines Background -->
            <div id="grid-lines" class="p-0">
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
                <div class="inner-grid-line"></div>
            </div>
        </div>

        <!-- The Editor (Transparent overlay) -->
        <textarea id="editor" spellcheck="false" placeholder=""></textarea>

        <!-- Command 3 Indicators (Hidden by default) -->
        <div id="screen3-indicators" class="hidden">
            <div class="floating-cmd" style="width: 485px; height: 44px; left: 940px; top: 20px;">I am unwell and will not be coming to the office today.</div>
            <div class="floating-cmd" style="width: 485px; height: 44px; left: 640px; top: 240px;">kangaroos in australia</div>
            <div class="floating-cmd" style="width: 485px; height: 44px; left: 1090px; top: 370px;">In all tables I have my custom column management...</div>
        </div>

        <!-- PRIMARY ACTION BUTTON -->
        <div id="dictate-btn" style="width: 265px;">
            <span id="btn-text">Start dictating</span>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        
        // Dynamic Scaling for viewport
        function scaleUI() {
            const container = document.getElementById('screen-container');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleUI);
        scaleUI();
    </script>
</body>
</html>
